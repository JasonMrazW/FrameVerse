baseURL = 'https://JasonMrazW.github.io/FrameVerse/'
locale = 'zh-cn'
title = 'FrameVerse | Computer Graphics Universe'
theme = 'PaperMod'

paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  description = 'FrameVerse 帧之寰宇，专注计算机图形学领域，深耕实时渲染、着色器开发、光线追踪、游戏引擎图形与图形算法理论。'
  comments = true
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.giscus]
    repo = 'JasonMrazW/FrameVerse'
    repoId = 'R_kgDOS_yZ0A'
    category = 'Announcements'
    categoryId = 'DIC_kwDOS_yZ0M4C_gh-'
    mapping = 'pathname'
    strict = '0'
    reactionsEnabled = '1'
    emitMetadata = '0'
    inputPosition = 'bottom'
    theme = 'preferred_color_scheme'
    lang = 'zh-CN'

  [params.homeInfoParams]
    Title = 'FrameVerse 帧之寰宇'
    Content = '专注计算机图形学领域，深耕实时渲染、着色器开发、光线追踪、游戏引擎图形与图形算法理论。'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/JasonMrazW'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 15
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']
