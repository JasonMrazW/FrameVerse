baseURL = 'https://JasonMrazW.github.io/FrameVerse/'
locale = 'zh-cn'
title = '我的技术博客'
theme = 'PaperMod'

paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  description = '记录技术学习与思考'
  comments = true
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.giscus]
    repo = 'JasonMrazW/FrameVerse'
    repoId = 'R_kgDOS_yZ0A'
    category = 'Announcements'
    categoryId = 'DIC_kwDOS_yZ0M4C_gh-'
    mapping = 'pathname'
    strict = '0'
    reactionsEnabled = '1'
    emitMetadata = '0'
    inputPosition = 'bottom'
    theme = 'preferred_color_scheme'
    lang = 'zh-CN'

  [params.homeInfoParams]
    Title = '你好，欢迎来到我的博客 👋'
    Content = '这里记录我的技术学习、项目实践与思考。'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']
